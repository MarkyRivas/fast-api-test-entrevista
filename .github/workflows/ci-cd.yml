name: CI/CD Pipeline

on:
  push:
    branches:
      - main # Se ejecuta automáticamente al hacer push a la rama principal

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO_NAME: cloud-run-source-deploy
  IMAGE_NAME: hello-world-app
  SERVICE_NAME: hello-world-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Validar, Construir y Desplegar

    steps:
      # 1. Preparación del entorno
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Validación del código (Linting del Dockerfile)
      - name: Validar Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # 3. Autenticación en Google Cloud Platform
      - name: Autenticar en Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # 4. Configurar Docker para el registro de contenedores de GCP
      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 5. Construcción de la imagen Docker
      - name: Construir imagen Docker
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      # 6. Publicación de la imagen en el registro
      - name: Publicar imagen en Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # 7. Despliegue de la aplicación
      - name: Desplegar en Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated --port=8000' # Ideal para pruebas de "Hello World"